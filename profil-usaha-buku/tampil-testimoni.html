<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.1" />
    <title>Semua Testimoni - Profil Usaha Buku</title>
    <link rel="stylesheet" href="style.css" />
</head>
 <body>
<header>
<h1>Maaya Hanafi's Bookstore</h1>
<nav>
    <a href="index.html">Home</a>
        <a href="produk.html">Products</a>
        <a href="bedah-buku.html">Reviews</a>
        <a href="testimoni.html">Testimonials</a>
        <a href="tampil-testimoni.html">Customer Testimonials</a>
</nav>
</header>

<main class="formulir">
<h2>Customers' Reviews :</h2>
<div id="daftartestimoni"></div>

<section>
    <div id="daftarTestimoni"></div>
</section>

<button id="hapusSemua">Erase All</button>
</div>
</main>
<footer>
    <p>&copy; 2026 Maaya Hanafi's Bookstore</p>
</footer>

<script>
    const container =
    document.getElementById('daftarTestimoni');
    const testimoniList =
JSON.parse(localStorage.getItem('testimoniList')) || [];

if (testimoniList.length === 0) {
    container.innerHTML = "<p>No Reviews Submitted.</p>";
} else {
    testimoniList.forEach((t, i) => {
        const el = document.createElement('div');
        el.className = 'testimoni-box';
        el.innerHTML = `
        <p><strong>Name:</strong> ${t.nama}</p>
        <p><strong>Email:</strong> ${t.email}</p>
        <p><strong>Affliations:</strong> ${t.asal}</p>
        <p><strong>Purchased Book:</strong> ${t.judul}</p>
        <p><strong>Message:</strong> ${t.pesan}</p>
        <p><strong>Rating:</strong> ${t.rating}</p>
    ` ;
    container.appendChild(el);
    });
    }

    document.getElementById("hapusSemua").addEventListener("click", function() {
        const konfirmasi = confirm("Are you sure you want to erase every review?")
        if (konfirmasi) {
            localStorage.removeItem("testimoniList");
            location.reload();
        }
    });
    </script>
    
    </body>
    </html>
