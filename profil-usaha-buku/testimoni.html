<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css" />
</head>
 <body>
    <header>
        <img src="file:///C:/Users/user/header.svg">

    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="produk.html">Products</a>
        <a href="bedah-buku.html">Reviews</a>
        <a href="testimoni.html">Testimonials</a>
        <a href="tampil-testimoni.html">Customer Testimonials</a>
</nav>
<h1>Maaya Hanafi's Bookstore</h1>

<main class="formulir">
    <h2>Give your Review</h2>
    <form id="formTestimoni">
        <label for ="nama">Name:</label>
    <input type="text" id="nama" name="nama" required placeholder="Full Name">

    <label for ="email">Email:</label>
    <input type="email" id="email" name="email" required placeholder="email@example.com">

    <label for ="asal">Asal Sekolah/ Komunitas:</label>
    <input type="text" id="asal" name="asal" required placeholder="Name of school /Institution/ community">

    <label for ="judul">Purchased Book:</label>
    <input type="text" id="judul" name="judul" required placeholder="Name of purchased book">

    <label for ="pesan">Your Review:</label>
    <textarea id="pesan" name="pesan" required placeholder="Write your experience..." rows="5"></textarea>

    <label for ="rating">Rating (1-5):</label>
    <input type="number" id="rating" name="rating" max="5" min="0">

    <button type="submit">Send Review</button>
    </form>
</main>
<footer>
    <p>&copy; 2026 Maaya Hanafi's Bookstore</p>
</footer>

<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value;
        const email = document.getElementById('email').value;
        const asal = document.getElementById('asal').value;
        const judul = document.getElementById('judul').value;
        const pesan = document.getElementById('pesan').value;
        const rating = document.getElementById('rating').value;

        const dataBaru = { nama, email, asal, judul, pesan, rating };

        // Ambil list dari localStorage
        const testimoniList =
    JSON.parse(localStorage.getItem('testimoniList')) || [];

    //Tambahkan testimoni baru
    testimoniList.push(dataBaru);

    //Simpan kembali ke localStorage
    localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

    //Arahkan ke halaman konfirmasi
    window.location.href = 'proses-testimoni.html';
    });
</script>
